# Estágio 1: Build (Instalação de dependências)
FROM python:3.11-slim AS builder

# Define diretório de trabalho
WORKDIR /app

# Instala dependências de sistema necessárias para compilação
RUN apt-get update && apt-get install -y --no-install-recommends \
    build-essential \
    && rm -rf /var/lib/apt/lists/*

# Instala dependências Python em um diretório local
COPY requirements.txt .
RUN pip install --no-cache-dir --user -r requirements.txt

# Estágio 2: Runtime (Imagem final otimizada)
FROM python:3.11-slim

# Define variáveis de ambiente para produção
ENV PYTHONDONTWRITEBYTECODE=1 \
    PYTHONUNBUFFERED=1 \
    DATABASE_URL="" \
    API_KEY=""

# Cria usuário não-root para segurança
RUN groupadd -g 1000 appuser && \
    useradd -u 1000 -g appuser -s /bin/bash appuser

WORKDIR /app

# Copia apenas as dependências instaladas do estágio builder
COPY --from=builder /root/.local /home/appuser/.local
COPY . .

# Ajusta permissões
RUN chown -R appuser:appuser /app

# Adiciona o caminho das dependências ao PATH
ENV PATH=/home/appuser/.local/bin:$PATH

# Define usuário não-root
USER appuser

# Expõe a porta da aplicação
EXPOSE 8080

# Healthcheck para Kubernetes verificar a saúde do container
HEALTHCHECK --interval=30s --timeout=5s --start-period=5s --retries=3 \
    CMD curl -f http://localhost:8080/health || exit 1

# Comando de inicialização com Gunicorn
CMD ["gunicorn", "--bind", "0.0.0.0:8080", "--workers", "4", "app:app"]