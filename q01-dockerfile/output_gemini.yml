# Estágio 1: Build das dependências
FROM python:3.11-slim AS builder

# Define diretório de trabalho
WORKDIR /app

# Instala dependências de sistema necessárias para compilação
RUN apt-get update && apt-get install -y --no-install-recommends gcc python3-dev && rm -rf /var/lib/apt/lists/*

# Instala dependências Python em uma pasta local
COPY requirements.txt .
RUN pip install --no-cache-dir --user -r requirements.txt

# Estágio 2: Imagem final de produção
FROM python:3.11-slim

# Define variáveis de ambiente
ENV PYTHONDONTWRITEBYTECODE=1
ENV PYTHONUNBUFFERED=1
ENV DATABASE_URL=""
ENV API_KEY=""

# Cria usuário não-root para segurança
RUN groupadd -g 1000 appuser && useradd -u 1000 -g appuser -m appuser

WORKDIR /app

# Copia apenas as dependências instaladas do estágio builder
COPY --from=builder /root/.local /home/appuser/.local
COPY . .

# Ajusta permissões
RUN chown -R appuser:appuser /app

# Adiciona o caminho das dependências ao PATH
ENV PATH=/home/appuser/.local/bin:$PATH

# Define usuário não-root
USER appuser

# Expõe a porta da aplicação
EXPOSE 8080

# Healthcheck usando Python nativo para evitar dependências externas
HEALTHCHECK --interval=30s --timeout=5s --start-period=5s CMD python -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"

# Comando de inicialização com Gunicorn
CMD ["gunicorn", "--bind", "0.0.0.0:8080", "--workers", "4", "app:app"]