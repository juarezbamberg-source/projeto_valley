FROM node:lts-alpine AS builder

# Estágio de construção: instalar dependências e compilar se necessário
WORKDIR /app
COPY package*.json ./
RUN npm ci --only=production
COPY . .

# Estágio final: imagem mínima de execução
FROM node:lts-alpine

# Variáveis de ambiente com valores padrão
ENV NODE_ENV=production \
    LOG_LEVEL=info

# Instalar curl para health check
RUN apk add --no-cache curl

# Criar usuário não-root 'node' (já existe na imagem oficial)
USER node

# Definir diretório de trabalho
WORKDIR /app

# Copiar dependências e código do estágio de construção (preservar permissões)
COPY --from=builder --chown=node:node /app/node_modules ./node_modules
COPY --from=builder --chown=node:node /app ./

# Expor porta da aplicação
EXPOSE 3000

# Health check: verificar se app responde na porta 3000
HEALTHCHECK --interval=30s --timeout=5s --start-period=10s --retries=3 \
    CMD curl --fail http://localhost:3000/health || exit 1

# Comando de inicialização
CMD ["node", "index.js"]