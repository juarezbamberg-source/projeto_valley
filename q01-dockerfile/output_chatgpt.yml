# Stage 1: Build
FROM node:20-alpine AS build

# Set working directory
WORKDIR /app

# Copy package files first to leverage Docker cache
COPY package*.json ./

# Install all dependencies (including devDependencies for build)
RUN npm ci

# Copy application source code
COPY . .

# Stage 2: Production
FROM node:20-alpine

# Set environment variables with defaults
ENV NODE_ENV=production \
    LOG_LEVEL=info

# Create and use a non-root user for security
RUN addgroup -S appgroup && adduser -S appuser -G appgroup
USER appuser

# Set working directory
WORKDIR /home/appuser

# Copy only production dependencies from build stage
COPY --from=build /app/node_modules ./node_modules
COPY --from=build /app .

# Expose the application port
EXPOSE 3000

# Health check to ensure the app is running
HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
    CMD wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1

# Start the application
CMD ["node", "index.js"]

Multi-stage build reduces final image size by separating build dependencies from runtime dependencies, making the production image smaller and more secure. Using a non-root user minimizes the impact of potential security breaches. The health check allows orchestration tools to detect and restart unhealthy containers automatically. Environment variables (NODE_ENV, LOG_LEVEL) provide flexible configuration without code changes. Alpine base keeps the image lightweight while maintaining compatibility. Layer caching is optimized by handling package files before source code, speeding up rebuilds.