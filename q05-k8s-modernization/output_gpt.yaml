apiVersion: v1
kind: Secret
metadata:
  name: chronos-secrets
  labels:
    app: chronos
    component: api
    tier: backend
    environment: production
    version: v1.2.3
  annotations:
    owner: platform-team
    managed-by: kubectl
    cost-center: eng-ops
    purpose: externalized-secrets
type: Opaque
data:
  DB_PASSWORD: [REPLACE_ME]   # Base64 encoded placeholder
  JWT_SECRET: [REPLACE_ME]    # Base64 encoded placeholder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronos-api
  labels:
    app: chronos
    component: api
    tier: backend
    environment: production
    version: v1.2.3
  annotations:
    owner: platform-team
    managed-by: kubectl
    cost-center: eng-ops
    purpose: production-ready-chronos-api
spec:
  replicas: 3                    # Enhanced from 1 to 3 for high availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0          # Ensures zero downtime during updates
      maxSurge: 1                # Allows one extra pod during rollout
  selector:
    matchLabels:
      app: chronos
      component: api
      tier: backend
  template:
    metadata:
      labels:
        app: chronos
        component: api
        tier: backend
        environment: production
        version: v1.2.3
      annotations:
        prometheus.io/scrape: "true"   # Enables metric scraping for observability
        prometheus.io/port: "3000"
    spec:
      securityContext:                # Added for pod-level security
        runAsNonRoot: true            # Prevents running as root
        runAsUser: 1000               # Runs container with user ID 1000
      containers:
      - name: chronos-api
        image: chronos-api:v1.2.3     # Replaced 'latest' with specific version for reproducibility
        imagePullPolicy: IfNotPresent # Optimizes image pull only when not present locally
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: DB_PASSWORD           # Injected from Kubernetes Secret instead of plaintext
          valueFrom:
            secretKeyRef:
              name: chronos-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chronos-secrets
              key: JWT_SECRET
        resources:                    # Resource requests and limits added for performance and stability
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:                # Added to detect and restart unhealthy containers
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:               # Added to ensure traffic only reaches ready containers
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:              # Container-level security context for additional hardening
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

# Melhorias de produção:
# - Replicas aumentadas de 1 para 3 garantindo alta disponibilidade e tolerância a falhas.
# - Imagem fixada em versão específica eliminando surpresas de atualizações com 'latest'.
# - Secrets externalizados em um recurso Secret, removendo informações sensíveis do manifesto.
# - Recursos com requests e limits asseguram comportamento previsível e evitam starvation.
# - Probes de liveness e readiness garantem que o tráfego só seja enviado a contêineres saudáveis.
# - SecurityContext reforça execução não-root e privilégios mínimos, alinhado com práticas modernas.
# - Labels, annotations e estratégia RollingUpdate tornam a implantação pronta para produção.